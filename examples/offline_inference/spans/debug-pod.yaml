apiVersion: v1
kind: Pod
metadata:
  name: spans-debug-almog
  labels:
    app: spans-debug
    owner: almogtavor
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 5
  containers:
    - name: vllm
      image: vllm/vllm-openai:latest
      command: ["sleep", "infinity"]
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
        - name: HF_HOME
          value: /workspace/hf-cache
        - name: VLLM_SPANS_MODEL_INDEX
          value: "6"
        - name: VLLM_SPANS_TP
          value: "1"
      ports:
        - name: debugpy
          containerPort: 5678
      resources:
        limits:
          nvidia.com/gpu: "1"
          cpu: "8"
          memory: 64Gi
          ephemeral-storage: 80Gi
        requests:
          nvidia.com/gpu: "1"
          cpu: "4"
          memory: 32Gi
          ephemeral-storage: 40Gi
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: workspace
      emptyDir:
        sizeLimit: 80Gi
